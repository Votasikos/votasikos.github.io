<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>neopixel.fm | internet radio</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <script src="https://kit.fontawesome.com/01ec9ad15d.js" crossorigin="anonymous"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.min.js"></script>
  
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <header>
    <div class="header-content">
      <img src="logo.png" alt="Header Image" class="header-image">

    </div>
  </header>
  
  <main>
    <!-- Container for Now Playing and additional blocks -->
    <div id="blocks-container">
            <!-- Now Playing Section -->
            <section id="now-playing">
              <h3 id="now-playing-label">Now Playing</h3>
              <div id="listener-count">
                <i class="fas fa-headphones"></i> <span id="listener-number">0</span>
              </div>
              <div class="album-artwork">
                <img id="album-cover" src="" alt="Album Cover">
              </div>
              <div class="track-info">
                <div class="slide-container">
                  <p id="artist-name">Artist Name</p>
                  <h2 id="song-title">Song Title</h2>
                </div>
              </div>
            </section>
      
            <div id="rolling-text">
              <marquee behavior="scroll" direction="left">
                <span id="temperature-info"></span>
              </marquee>
            </div>
      
      </section>

      <!-- Additional Blocks -->

    </div>

    <!-- Last Played Section -->
<!-- Floating Player Controls -->
<div id="floating-player">
    <!-- Play/Pause Button -->
    <button id="play-pause-btn">
      <i id="play-icon" class="fas fa-play"></i>
      <i id="pause-icon" class="fas fa-pause" style="display: none;"></i>
    </button>
  
<!-- Volume Slider -->
<div class="volume-control">
    <i class="fas fa-volume-up"></i>
    <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5"> <!-- Default volume set to 50% -->
  </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
