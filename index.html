<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROLL 'N ROLL | COUNTDOWN</title>
    <link rel="stylesheet" href="css/odometer-theme-default.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    position: relative;
    z-index: 0;
    overflow: hidden;
    background-color: black;
}

#video-background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 25%;
    background-color: black;
    z-index: -1;
    filter: grayscale(1) contrast(1.5);
}


#title {
    font-size: 5vw;
    font-weight: 800;
    font-style: italic;
    text-transform: uppercase;
    color: rgb(170, 255, 0);
    text-shadow: 0 0 30px rgba(170, 255, 0, 0.4),
               0 0 50px rgba(170, 255, 0, 0.4),
               0 0 90px rgba(170, 255, 0, 0.4);
    margin-bottom: 1em;
    animation: titleGlow 1s ease-in-out infinite alternate;
}

@keyframes titleGlow {
    from {
        text-shadow: 0 0 20px rgba(170, 255, 0, 0.4),
                   0 0 30px rgba(170, 255, 0, 0.4),
                   0 0 40px rgba(170, 255, 0, 0.4);
    }
    to {
        text-shadow: 0 0 30px rgba(170, 255, 0, 0.4),
                   0 0 50px rgba(170, 255, 0, 0.4),
                   0 0 70px rgba(170, 255, 0, 0.4);
    }
}

#countdown {
    font-size: 10vw;
    color: rgb(255, 255, 255);
    display: flex;
    gap: 0.2em;
    font-weight: 700;
    position: relative;
    transition: 1s;
    overflow: hidden;
    mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
}

.separator {
    display: flex;
    align-items: start;    
}

.odometer.odometer-auto-theme.odometer-animating-up .odometer-ribbon-inner,
.odometer.odometer-theme-default.odometer-animating-up .odometer-ribbon-inner,
.odometer.odometer-auto-theme.odometer-animating-down.odometer-animating .odometer-ribbon-inner,
.odometer.odometer-theme-default.odometer-animating-down.odometer-animating .odometer-ribbon-inner {
    -webkit-transition: -webkit-transform 0.25s ease-in-out;
    -moz-transition: -moz-transform 0.25s ease-in-out;
    -ms-transition: -ms-transform 0.25s ease-in-out;
    -o-transition: -o-transform 0.25s ease-in-out;
    transition: transform 0.25s ease-in-out;
}
    </style>
</head>
<body>
    <div id="video-background">
        <iframe width="100%" height="100%" src="https://www.youtube.com/embed/V096CbyyJJ8?autoplay=1&mute=1&loop=1&controls=0&playlist=V096CbyyJJ8" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div id="title">Troll 'n Roll</div>
    <div id="countdown">
        <div id="days"></div>
        <div class="separator">:</div>
        <div id="hours"></div>
        <div class="separator">:</div>
        <div id="minutes"></div>
        <div class="separator">:</div>
        <div id="seconds"></div>
    </div>
    <script src="js/odometer.js"></script>
    <script>
        // Initialize Odometers with specific formats
        const daysOdometer = new Odometer({ el: document.getElementById('days'), value: 0, format: 'd' });
        const hoursOdometer = new Odometer({ el: document.getElementById('hours'), value: 0, format: 'dd' });
        const minutesOdometer = new Odometer({ el: document.getElementById('minutes'), value: 0, format: 'dd' });
        const secondsOdometer = new Odometer({ el: document.getElementById('seconds'), value: 0, format: 'dd' });
    
        function update() {
            const now = new Date();
            const targetDate = new Date('2025-02-01T19:00:00');
            const diff = targetDate - now;
            
            // Update each odometer with numeric values
            daysOdometer.update(Math.floor(diff / 864e5));
            hoursOdometer.update(Math.floor(diff / 36e5 % 24));
            minutesOdometer.update(Math.floor(diff / 6e4 % 60));
            secondsOdometer.update(Math.floor(diff / 1e3 % 60));
        }
    
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
