<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TROLL 'N ROLL | COUNTDOWN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/odometer-theme-default.css">
    <style>
body {
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    background-color: black !important;
    background: linear-gradient(45deg, 
    rgba(247, 38, 132, 0.5), 
    rgba(181, 23, 158, 0.5), 
    rgba(114, 9, 183, 0.5), 
    rgba(86, 11, 173, 0.5), 
    rgba(72, 12, 168, 0.5), 
    rgba(58, 12, 163, 0.5), 
    rgba(21, 159, 145, 0.5), 
    rgba(247, 37, 133, 0.5)
);

    background-size: 300% 300%;
    animation: gradientShift 30s linear infinite;
    position: relative;
    z-index: 0;
    overflow: hidden;
}

body::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: black; /* Start with a black background */
    animation: fadeIn 1s ease-in-out forwards; /* Fade in animation */
    z-index: 1; /* Ensure it covers the content initially */
}

@keyframes fadeIn {
    to {
        opacity: 0; /* Fade out the black overlay */
    }
}

@keyframes gradientShift {
    0% {
        background-position: 0% 60%;
    }
    25% {
        background-position: 50% 60%;
    }
    50% {
        background-position: 25% 60%;
    }
    100% {
        background-position: 0% 60%;
    }
}

#title {
    font-size: 5vw;
    font-weight: 800;
    font-style: italic;
    text-transform: uppercase;
    color: cyan;
    text-shadow: 0 0 30px rgba(0, 255, 255, 0.4),
               0 0 50px rgba(0, 255, 255, 0.4),
               0 0 90px rgba(0, 255, 255, 0.4);
    margin-bottom: 1em;
    animation: titleGlow 1s ease-in-out infinite alternate;
}

@keyframes titleGlow {
    from {
        text-shadow: 0 0 20px rgba(0, 255, 255, 0.4),
                   0 0 30px rgba(0, 255, 255, 0.4),
                   0 0 40px rgba(0, 255, 255, 0.4);
    }
    to {
        text-shadow: 0 0 30px rgba(0, 255, 255, 0.4),
                   0 0 50px rgba(0, 255, 255, 0.4),
                   0 0 70px rgba(0, 255, 255, 0.4);
    }
}

#countdown {
    font-size: 10vw;
    color: rgb(255, 255, 255);
    display: flex;
    gap: 0.2em;
    font-weight: 700;
    position: relative;
    text-shadow: 0px 3px 40px rgba(0, 0, 0, 0.25);
    overflow: hidden;
    mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
    -webkit-mask-image: linear-gradient(to bottom, transparent, black 20%, black 80%, transparent);
}

.separator {
    display: flex;
    align-items: center;
}

.odometer.odometer-auto-theme.odometer-animating-up .odometer-ribbon-inner,
.odometer.odometer-theme-default.odometer-animating-up .odometer-ribbon-inner,
.odometer.odometer-auto-theme.odometer-animating-down.odometer-animating .odometer-ribbon-inner,
.odometer.odometer-theme-default.odometer-animating-down.odometer-animating .odometer-ribbon-inner {
    -webkit-transition: -webkit-transform .5s ease-in-out;
    -moz-transition: -moz-transform .5s ease-in-out;
    -ms-transition: -ms-transform .5s ease-in-out;
    -o-transition: -o-transform .5s ease-in-out;
    transition: transform .5s ease-in-out;
}
    </style>
</head>
<body>
    <audio id="background-audio" autoplay loop>
        <source src="media/music.mp3" type="audio/mp3">
    </audio>

    <div id="title">Troll 'n Roll</div>
    <div id="countdown">
        <div id="days"></div>
        <div class="separator">:</div>
        <div id="hours"></div>
        <div class="separator">:</div>
        <div id="minutes"></div>
        <div class="separator">:</div>
        <div id="seconds"></div>
    </div>
    <script src="https://github.hubspot.com/odometer/odometer.js"></script>
    <script>
        // Set the volume of the audio
        const audioElement = document.getElementById('background-audio');
        audioElement.volume = 0.5; // Ensure volume is set
        audioElement.muted = false; // Ensure it's not muted


        // Initialize Odometers with specific formats
        const daysOdometer = new Odometer({ el: document.getElementById('days'), value: 0, format: 'd' });
        const hoursOdometer = new Odometer({ el: document.getElementById('hours'), value: 0, format: 'dd' });
        const minutesOdometer = new Odometer({ el: document.getElementById('minutes'), value: 0, format: 'dd' });
        const secondsOdometer = new Odometer({ el: document.getElementById('seconds'), value: 0, format: 'dd' });
    
        function update() {
            const now = new Date();
            const targetDate = new Date('2025-02-01T19:00:00');
            const diff = targetDate - now;
            
            // Update each odometer with numeric values
            daysOdometer.update(Math.floor(diff / 864e5));
            hoursOdometer.update(Math.floor(diff / 36e5 % 24));
            minutesOdometer.update(Math.floor(diff / 6e4 % 60));
            secondsOdometer.update(Math.floor(diff / 1e3 % 60));
        }
    
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
