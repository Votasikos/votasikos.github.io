<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>neopixel.fm | internet radio</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="header-content">
      <img src="logo2.png" alt="Logo" class="header-image">
    </div>
  </header>

  <main>
    <div id="blocks-container">
      <section id="now-playing">
        <h3 id="now-playing-label">Now Playing</h3>
        <div id="listener-count">Listeners: 0</div>
        <div class="album-artwork">
          <img id="album-cover" src="" alt="Album Cover">
        </div>
        <div class="track-info">
          <div class="slide-container">
            <h2 id="song-title">Song Title</h2>
            <p id="artist-name">Artist Name</p>
          </div>
        </div>
      </section>
    </div>

    <div id="floating-player">
      <button id="play-pause-btn">
        <i id="play-icon" class="fas fa-play"></i>
        <i id="pause-icon" class="fas fa-pause" style="display: none;"></i>
      </button>
      <div class="volume-control">
        <i class="fas fa-volume-up"></i>
        <input type="range" id="volume-slider" min="0" max="1" step="0.1" value="0.5">
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
